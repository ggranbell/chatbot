<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" /> -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Shrikhand&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <link rel="stylesheet" href="../css/custom/custom.css">
    <link rel="stylesheet" href="../css/output/output.css">
    <title>Document</title>
</head>
<body class="w-full h-screen bg-base-300 inter">
    <header class="w-full h-[60px] md:h-[80px] flex items-center justify-between px-2 md:px-6 lg:px-10">
        <h1>
            <a href="" class="shrikhand-regular text-3xl md:text-4xl tracking-tighter">mola</a>
        </h1>
        <button class="burger-close-btn ch-closed btn btn-square tooltip tooltip-left flex items-center justify-center shadow-md" data-tip="Menu & Chat History">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"
                class="size-6 block">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M12 17.25h8.25" />
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"
                class="size-6 hidden">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>
    </header>
    <aside class="w-[300px] h-full bg-base-100 fixed top-0 left-0 bottom-0 shadow-lg p-4 " id="ch-menu-modal" popover="manual">
        <nav class="w-full h-full flex flex-col">
            <button class="btn btn-block btn-primary flex items-center justify-start gap-2 cursor-not-allowed" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
                    <path
                        d="m5.433 13.917 1.262-3.155A4 4 0 0 1 7.58 9.42l6.92-6.918a2.121 2.121 0 0 1 3 3l-6.92 6.918c-.383.383-.84.685-1.343.886l-3.154 1.262a.5.5 0 0 1-.65-.65Z" />
                    <path
                        d="M3.5 5.75c0-.69.56-1.25 1.25-1.25H10A.75.75 0 0 0 10 3H4.75A2.75 2.75 0 0 0 2 5.75v9.5A2.75 2.75 0 0 0 4.75 18h9.5A2.75 2.75 0 0 0 17 15.25V10a.75.75 0 0 0-1.5 0v5.25c0 .69-.56 1.25-1.25 1.25h-9.5c-.69 0-1.25-.56-1.25-1.25v-9.5Z" />
                </svg>
                New chat
            </button>
            <div class="divider my-2"></div>
            <h6 class="text-base-content/50 font-semibold text-sm">Chat History</h6>
            <div class="my-2 w-full h-[50%] bg-base-300 cursor-not-allowed overflow-auto" disabled>
            
            </div>
            <div class="divider my-2"></div>
            <div class=" w-full grow flex fle-col items-end">
                <button class="btn btn-block btn-accent flex items-center justify-start gap-2" popovertarget="settings-container" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
                        <path fill-rule="evenodd"
                            d="M7.84 1.804A1 1 0 0 1 8.82 1h2.36a1 1 0 0 1 .98.804l.331 1.652a6.993 6.993 0 0 1 1.929 1.115l1.598-.54a1 1 0 0 1 1.186.447l1.18 2.044a1 1 0 0 1-.205 1.251l-1.267 1.113a7.047 7.047 0 0 1 0 2.228l1.267 1.113a1 1 0 0 1 .206 1.25l-1.18 2.045a1 1 0 0 1-1.187.447l-1.598-.54a6.993 6.993 0 0 1-1.929 1.115l-.33 1.652a1 1 0 0 1-.98.804H8.82a1 1 0 0 1-.98-.804l-.331-1.652a6.993 6.993 0 0 1-1.929-1.115l-1.598.54a1 1 0 0 1-1.186-.447l-1.18-2.044a1 1 0 0 1 .205-1.251l1.267-1.114a7.05 7.05 0 0 1 0-2.227L1.821 7.773a1 1 0 0 1-.206-1.25l1.18-2.045a1 1 0 0 1 1.187-.447l1.598.54A6.992 6.992 0 0 1 7.51 3.456l.33-1.652ZM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                            clip-rule="evenodd" />
                    </svg>
            
                    Account & Settings
                </button>
            </div>
        </nav>
    </aside>

    <main class="w-full h-[calc(100%-60px)] md:h-[calc(100%-80px)] flex flex-col items-center justify-center gap-2 py-4 ">
        <div class="chat-box-main w-full min-h-0 overflow-auto ease-in-out duration-1000 relative px-1 sm:px-16 md:px-36 lg:px-56 xl:px-72">
            <div class="chat-loading-animation hidden w-full h-auto px-4 py-6  flex flex-col gap-1">
                <span class="text-base-content/60">Mola is thinking please wait...</span>
                <div>
                    <span class="loading loading-ring loading-sm"></span>
                    <span class="loading loading-ring loading-xl"></span>
                    <span class="loading loading-ring loading-sm"></span>
                    <span class="loading loading-ring loading-xl"></span>
                </div>
            </div>   
        </div>
        <div class="w-full px-1 sm:px-16 md:px-36 lg:px-56 xl:px-72">
            <div class="w-full min-h-[228px]  h-auto bg-base-200 rounded-xl px-4 py-6 overflow-hidden shadow-lg flex flex-col gap-2 z-10">
                <div class="w-full h-auto flex items-center justify-start">
                    <div class="w-auto tags-container flex items-center justify-start">
                        <button class="btn btn-xs btn-soft rounded-4xl text-xs flex items-center justify-center gap-1" popovertarget="popover-1" style="anchor-name:--anchor-1" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
                                <path
                                    d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z" />
                            </svg>
                            Add Tags
                        </button>
                        <ul class="dropdown menu w-auto rounded-box bg-base-100 shadow-sm mt-2" popover id="popover-1"
                            style="position-anchor:--anchor-1">
                            <li><a class="tags-choices">SunFish</a></li>
                            <li><a class="tags-choices">GreatDay</a></li>
                            <li><a class="tags-choices">Managed Payroll Services</a></li>
                        </ul>
                    </div>
                </div>
                <div class="w-full min-h-[100px] h-auto">
                    <textarea placeholder="Ask Mola" class="question-textarea textarea textarea-primary w-full min-h-[100px] max-h-[200px] bg-base-300 border-base-300 rounded-lg in focus:outline-none active:outline-none"></textarea>
                </div>
                <div class="w-full h-auto flex items-center justify-between">
            
                    <div class="w-auto flex items-center justify-start text-xs text-info font-semibold">
                        <span class="text-lg">🛈&nbsp;</span> Mola can make mistakes. Check important info.
                    </div>
                    <div class="w-auto send-container flex- items-center justify-end">
                        <button class="send-question-btn btn btn-md btn-primary rounded-4xl text-sm flex items-center justify-center gap-1 cursor-not-allowed" disabled>
                            Send
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5 rotate-340">
                                <path
                                    d="M3.105 2.288a.75.75 0 0 0-.826.95l1.414 4.926A1.5 1.5 0 0 0 5.135 9.25h6.115a.75.75 0 0 1 0 1.5H5.135a1.5 1.5 0 0 0-1.442 1.086l-1.414 4.926a.75.75 0 0 0 .826.95 28.897 28.897 0 0 0 15.293-7.155.75.75 0 0 0 0-1.114A28.897 28.897 0 0 0 3.105 2.288Z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <main class="w-screen h-screen bg-base-300/70" id="settings-container" popover>
        <!-- <div class="w-full h-full flex items-center justify-center">
            <div class="w-3/4 min-w-[320px] max-w-[1000px] aspect-video bg-base-100 shadow flex px-4">
                <nav class="w-1/4 h-full bg-red-300">

                </nav>
            </div>
        </div> -->
    </main>
    <main class="w-screen h-screen bg-base-300/70" id="upload-knowledge-base-container" popover>
        <div class="w-full h-full flex items-center justify-center">
            
            <div class="relative w-3/4 min-w-[320px] max-w-[1000px] aspect-video bg-base-100 shadow flex px-6 pt-10 pb-6 flex flex-col gap-2">
                <button class="btn btn-ghost btn-circle absolute right-1 top-1 tooltip" data-tip="Close" popovertarget="upload-knowledge-base-container" popovertargetaction="hide">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
                        <path
                            d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
                    </svg>
                </button>
                <div class="w-full flex flex-col">
                    <h1 class="text-2xl font-semibold">Import New Knowledge</h1>
                <p class="text-base-content/60">This will replace your current files with the new ones you upload.</p>
                </div>
                <div class="w-full grow bg-base-300 rounded-md flex items-center justify-center">
                    <div class="flex items-center justify-center w-full max-w-xl mx-auto p-6">
                        <label for="dropzone-file" id="drop-area"
                            class="group flex flex-col items-center justify-center w-full h-64 border-2 border-dashed border-base-300 rounded-2xl bg-base-200 hover:bg-base-300 hover:border-primary transition-all cursor-pointer">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-12 h-12 mb-4 text-base-content opacity-50 group-hover:text-primary group-hover:scale-110 transition-transform"
                                    aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2" />
                                </svg>
                    
                                <p class="mb-2 text-sm text-base-content">
                                    <span class="font-bold">Click to upload</span>
                                </p>
                                <p class="text-xs text-base-content opacity-60">PDF only.</p>
                            </div>
                    
                            <input id="dropzone-file" accept="application/pdf" type="file" class="hidden" />
                    
                            <div id="file-name" class="mt-2 badge badge-primary hidden"></div>
                        </label>
                    </div>
                </div>
                <div class="w-full flex items-center justify-end gap-2">
                    <button class="btn btn-ghost btn-error rounded-full" popovertarget="upload-knowledge-base-container" popovertargetaction="hide">Cancel</button>
                    <button id="upload-knowledge-btn" class="btn btn-primary rounded-full" disabled>Upload</button>
                </div>
            </div>
        </div>
    </main>
    <div class="fab">
        <!-- a focusable div with tabindex is necessary to work on all browsers. role="button" is necessary for accessibility -->
        <div tabindex="0" role="button" class="btn btn-lg btn-circle btn-primary tooltip tooltip-left" data-tip="Admin Settings">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
                <path
                    d="M13.024 9.25c.47 0 .827-.433.637-.863a4 4 0 0 0-4.094-2.364c-.468.05-.665.576-.43.984l1.08 1.868a.75.75 0 0 0 .649.375h2.158ZM7.84 7.758c-.236-.408-.79-.5-1.068-.12A3.982 3.982 0 0 0 6 10c0 .884.287 1.7.772 2.363.278.38.832.287 1.068-.12l1.078-1.868a.75.75 0 0 0 0-.75L7.839 7.758ZM9.138 12.993c-.235.408-.039.934.43.984a4 4 0 0 0 4.094-2.364c.19-.43-.168-.863-.638-.863h-2.158a.75.75 0 0 0-.65.375l-1.078 1.868Z" />
                <path fill-rule="evenodd"
                    d="m14.13 4.347.644-1.117a.75.75 0 0 0-1.299-.75l-.644 1.116a6.954 6.954 0 0 0-2.081-.556V1.75a.75.75 0 0 0-1.5 0v1.29a6.954 6.954 0 0 0-2.081.556L6.525 2.48a.75.75 0 1 0-1.3.75l.645 1.117A7.04 7.04 0 0 0 4.347 5.87L3.23 5.225a.75.75 0 1 0-.75 1.3l1.116.644A6.954 6.954 0 0 0 3.04 9.25H1.75a.75.75 0 0 0 0 1.5h1.29c.078.733.27 1.433.556 2.081l-1.116.645a.75.75 0 1 0 .75 1.298l1.117-.644a7.04 7.04 0 0 0 1.523 1.523l-.645 1.117a.75.75 0 1 0 1.3.75l.644-1.116a6.954 6.954 0 0 0 2.081.556v1.29a.75.75 0 0 0 1.5 0v-1.29a6.954 6.954 0 0 0 2.081-.556l.645 1.116a.75.75 0 0 0 1.299-.75l-.645-1.117a7.042 7.042 0 0 0 1.523-1.523l1.117.644a.75.75 0 0 0 .75-1.298l-1.116-.645a6.954 6.954 0 0 0 .556-2.081h1.29a.75.75 0 0 0 0-1.5h-1.29a6.954 6.954 0 0 0-.556-2.081l1.116-.644a.75.75 0 0 0-.75-1.3l-1.117.645a7.04 7.04 0 0 0-1.524-1.523ZM10 4.5a5.475 5.475 0 0 0-2.781.754A5.527 5.527 0 0 0 5.22 7.277 5.475 5.475 0 0 0 4.5 10a5.475 5.475 0 0 0 .752 2.777 5.527 5.527 0 0 0 2.028 2.004c.802.458 1.73.719 2.72.719a5.474 5.474 0 0 0 2.78-.753 5.527 5.527 0 0 0 2.001-2.027c.458-.802.719-1.73.719-2.72a5.475 5.475 0 0 0-.753-2.78 5.528 5.528 0 0 0-2.028-2.002A5.475 5.475 0 0 0 10 4.5Z"
                    clip-rule="evenodd" />
            </svg>

        </div>
    
        <div class="fab-close">
            Close <span class="btn btn-circle btn-lg btn-error">✕</span>
        </div>
    
        <div>
            Import Knowledge
            <button class="btn btn-lg btn-circle" popovertarget="upload-knowledge-base-container">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
                    <path
                        d="M9.25 13.25a.75.75 0 0 0 1.5 0V4.636l2.955 3.129a.75.75 0 0 0 1.09-1.03l-4.25-4.5a.75.75 0 0 0-1.09 0l-4.25 4.5a.75.75 0 1 0 1.09 1.03L9.25 4.636v8.614Z" />
                    <path
                        d="M3.5 12.75a.75.75 0 0 0-1.5 0v2.5A2.75 2.75 0 0 0 4.75 18h10.5A2.75 2.75 0 0 0 18 15.25v-2.5a.75.75 0 0 0-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5Z" />
                </svg>
            </button>
        </div>
        <div>
            View DB Rows
            <button id="view-db-rows-btn" class="btn btn-lg btn-circle btn-info">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
                    <path d="M3 4.25A2.25 2.25 0 0 1 5.25 2h9.5A2.25 2.25 0 0 1 17 4.25v11.5A2.25 2.25 0 0 1 14.75 18h-9.5A2.25 2.25 0 0 1 3 15.75V4.25Zm2 1.25a.75.75 0 0 0-.75.75v2.5c0 .414.336.75.75.75h10a.75.75 0 0 0 .75-.75v-2.5a.75.75 0 0 0-.75-.75H5Zm0 5a.75.75 0 0 0-.75.75v2.5c0 .414.336.75.75.75h10a.75.75 0 0 0 .75-.75v-2.5a.75.75 0 0 0-.75-.75H5Z" />
                </svg>
            </button>
        </div>
        <div>
            Truncate DB
            <button id="truncate-db-btn" class="btn btn-lg btn-circle btn-error">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
                    <path fill-rule="evenodd" d="M7.312 4.5a.75.75 0 0 1 .75-.75h3.876a.75.75 0 0 1 .75.75V6H15a.75.75 0 0 1 0 1.5h-.386l-.544 8.157A2.25 2.25 0 0 1 11.826 18H8.174a2.25 2.25 0 0 1-2.244-2.343L5.386 7.5H5a.75.75 0 0 1 0-1.5h2.312V4.5Zm1.5.75V6h2.376v-.75H8.812Zm-.62 3.25a.75.75 0 0 0-1.5 0v5a.75.75 0 0 0 1.5 0v-5Zm4.116 0a.75.75 0 0 0-1.5 0v5a.75.75 0 0 0 1.5 0v-5Z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>
        <!-- <div>Label B <button class="btn btn-lg btn-circle">B</button></div>
        <div>Label C <button class="btn btn-lg btn-circle">C</button></div> -->
    </div>

    <script src="../js/index-front.js"></script>
</body>
</html>
